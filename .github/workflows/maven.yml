
name: Automation Workflow

on:
  schedule:
    - cron: 30 23 * * *
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '16'
        distribution: 'temurin'
        cache: maven
    - name: Runnin Automation Framework with Maven
      run: mvn clean test
      
    - name: Upload Test logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
       name: Test logs
       path: logs/

    - name: Upload Test Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
       name: Test Reports
       path: report.html
       
    - name: Upload Test Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
       name: Screenshots
       path: Screenshots/

    - name: Copy Report to gh-pages folder
      if: always()
      
      run: |
        mkdir -p public/extent-reports
        cp -R report.html public/extent-reports
        cp -R Screenshots public/extent-reports/Screenshots
        ls -l

    - name: Deploy
      if: always()
      uses: JamesIves/github-pages-deploy-action@v4.8.0
      with:
        folder: public/extent-reports
        token: ${{ secrets.TESTING}}
        clean: true
      
    - name: Test Execution Status
      run: echo "Test execution completed"
    
  

          
  
